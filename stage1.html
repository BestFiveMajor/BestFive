<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BestFive Masters Pick'em</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#091020;
  --bg-card:rgba(15,28,56,0.7);
  --card-border:rgba(201,168,76,0.1);
  --gold:#c9a84c;--gold-light:#e8dcc8;--gold-dim:#7a5e1e;
  --gold-glow:rgba(201,168,76,0.25);
  --circle-bg:linear-gradient(145deg,#ddd4b8,#b8a878);
  --circle-border:#9a8858;--circle-text:#4a3e1e;
  --adv-bg:rgba(20,55,22,0.85);--adv-border:#38a040;--adv-glow:rgba(56,160,64,0.2);--adv-text:#c8f0c8;
  --elim-bg:rgba(55,18,24,0.4);--elim-border:rgba(160,48,64,0.4);--elim-text:rgba(240,200,204,0.5);
  --text:#e4ddc8;--text-dim:#5a5545;
  --line-color:rgba(201,168,76,0.3);
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-user-select:none;user-select:none;overflow-x:hidden}

#captureArea{background:var(--bg)}

/* HEADER */
.header{text-align:center;padding:20px 16px 12px;position:relative}
.header-logo{height:28px;margin-bottom:6px}
.header h1{font-family:'Oswald',sans-serif;font-size:clamp(28px,5.5vw,48px);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);line-height:1.05}
.header .sub{font-family:'Oswald',sans-serif;font-size:clamp(11px,1.6vw,14px);font-weight:500;color:var(--gold-dim);letter-spacing:5px;text-transform:uppercase;margin-top:2px}

/* STAGE */
.stage-label{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-align:center;color:var(--gold);padding:10px 0 4px}

/* POOL */
.pool-wrap{padding:6px 16px 10px;max-width:1300px;margin:0 auto}
.pool-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);text-align:center;margin-bottom:6px}
.pool-label span{color:var(--gold)}
.pool-info{font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:6px}
.team-pool{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:50px;padding:10px;background:rgba(15,28,56,0.6);border-radius:10px;border:1px solid var(--card-border)}

/* TEAM LOGO */
.team-logo{width:44px;height:44px;border-radius:50%;background:#161830;border:2px solid rgba(255,255,255,0.1);cursor:grab;position:relative;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;flex-shrink:0;touch-action:none;-webkit-user-select:none;user-select:none}
.team-logo:active{cursor:grabbing}
.team-logo:hover{border-color:var(--gold);transform:scale(1.12);box-shadow:0 0 10px var(--gold-glow);z-index:10;overflow:visible}
.team-logo img{width:100%;height:100%;object-fit:contain;padding:2px;pointer-events:none;border-radius:50%}
.team-logo .tip{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.95);color:var(--gold-light);font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:100;border:1px solid rgba(201,168,76,0.3);letter-spacing:0.5px}
.team-logo:hover .tip{opacity:1}
.team-logo.dragging{opacity:0.25;transform:scale(0.85)}
.team-logo.in-slot{width:36px;height:36px}

/* BRACKET */
.bracket-scroll{overflow-x:auto;overflow-y:visible;padding:10px 20px 8px;-webkit-overflow-scrolling:touch;text-align:center}
.bracket-scroll::-webkit-scrollbar{height:5px}
.bracket-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.02);border-radius:3px}
.bracket-scroll::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

.bracket{display:inline-flex;gap:0;align-items:stretch;position:relative;padding:4px 0}
.round-col{display:flex;flex-direction:column;justify-content:center;gap:6px;flex-shrink:0;padding:0 16px;position:relative;z-index:1}

/* MATCH BOX (small, context) */
.match-box{background:var(--bg-card);border:1px solid var(--card-border);border-radius:8px;padding:3px 8px 6px;opacity:0.75;position:relative}
.box-hdr{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:var(--gold-dim);text-align:center;padding:1px 0 3px;letter-spacing:1px}
.mr{display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:2px}
.mr:last-child{margin-bottom:0}
.qc{width:22px;height:22px;border-radius:50%;background:var(--circle-bg);border:1.5px solid var(--circle-border);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;color:var(--circle-text);flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.3)}
.vs{font-family:'Oswald',sans-serif;font-size:8px;font-weight:700;color:rgba(255,255,255,0.2);letter-spacing:1px;min-width:14px;text-align:center}

/* RESULT BOX (advance - interactive) */
.result-box{border-radius:12px;padding:8px 14px 12px;position:relative}
.result-box.adv{background:var(--adv-bg);border:2px solid var(--adv-border);box-shadow:0 0 20px var(--adv-glow),inset 0 0 20px rgba(56,160,64,0.05)}
.res-hdr{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-align:center;padding:1px 0 8px;letter-spacing:2px;text-transform:uppercase}
.result-box.adv .res-hdr{color:var(--adv-text)}
.res-slots{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}

/* STATIC ELIMINATED BOX (non-interactive, muted) */
.elim-static{background:var(--elim-bg);border:1.5px solid var(--elim-border);border-radius:10px;padding:6px 10px 8px;opacity:0.55}
.elim-static .res-hdr{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;text-align:center;padding:1px 0 5px;letter-spacing:1px;color:var(--elim-text)}
.elim-static .static-circles{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.elim-static .sc{width:24px;height:24px;border-radius:50%;border:1.5px dashed rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,0.1)}

/* DROP SLOT */
.drop-slot{width:44px;height:44px;border-radius:50%;border:2px dashed rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;position:relative}
/* Larger invisible hit area for easier targeting — doesn't block logo interaction */
.drop-slot::after{content:'';position:absolute;top:-8px;left:-8px;right:-8px;bottom:-8px;border-radius:50%;pointer-events:none}
.drop-slot .sq{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,0.15)}
.drop-slot.drag-over{border-color:var(--gold);border-style:solid;background:var(--gold-glow);box-shadow:0 0 18px var(--gold-glow);transform:scale(1.12)}
.drop-slot.filled{border-style:solid;border-color:rgba(255,255,255,0.2);background:rgba(22,24,48,0.7);padding:1px;cursor:grab}
.drop-slot.filled.ds-adv{border-color:var(--adv-border)}

/* SPACERS */
.sp{height:4px}.sp-lg{height:10px}

/* CONNECTOR LINES (SVG overlay) */
.connector-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:visible}
.connector-svg path{fill:none;stroke:rgba(201,168,76,0.35);stroke-width:1.5}

/* COMPLETION */
.completion{display:none;text-align:center;padding:8px 16px;max-width:1300px;margin:2px auto 0}
.completion.show{display:block}
.completion p{color:var(--gold);font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.1),transparent);padding:8px;border-radius:8px;border:1px solid rgba(201,168,76,0.15)}

/* ACTIONS */
.actions{display:flex;gap:12px;justify-content:center;padding:8px 16px 20px;flex-wrap:wrap}
.btn{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 28px;border-radius:8px;border:none;cursor:pointer;transition:all .2s}
.btn-reset{background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid rgba(255,255,255,0.08)}
.btn-reset:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.btn-save{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0a0a0a}
.btn-save:hover{box-shadow:0 0 20px var(--gold-glow);transform:translateY(-1px)}
.btn-save:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}

.watermark{text-align:center;padding:6px 16px 10px;font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;opacity:0.3}

/* LANGUAGE SWITCH */
.lang-switch{position:absolute;top:20px;right:16px;display:flex;gap:4px;z-index:50}
.lang-btn{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;padding:4px 10px;border-radius:4px;border:1px solid rgba(201,168,76,0.2);background:rgba(15,28,56,0.7);color:var(--text-dim);cursor:pointer;transition:all .2s;text-transform:uppercase}
.lang-btn:hover{border-color:var(--gold);color:var(--gold-light)}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.12)}

/* TEAM INFO PANEL */
.info-wrap{padding:6px 16px 10px;max-width:1300px;margin:0 auto}
.info-toggle-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:8px;background:rgba(15,28,56,0.6);border:1px solid var(--card-border);border-radius:8px;cursor:pointer;transition:all .2s}
.info-toggle-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.06)}
.info-toggle-btn span{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase}
.info-toggle-btn .arrow{font-size:10px;color:var(--gold-dim);transition:transform .3s}
.info-toggle-btn.open .arrow{transform:rotate(180deg)}
.info-grid{display:none;margin-top:8px;display:grid;grid-template-columns:1fr;gap:4px;max-height:0;overflow:hidden;transition:max-height .4s ease}
.info-grid.show{max-height:3000px}
.info-card{background:rgba(15,28,56,0.5);border:1px solid rgba(201,168,76,0.08);border-radius:8px;overflow:hidden;transition:border-color .2s}
.info-card:hover{border-color:rgba(201,168,76,0.2)}
.info-card-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer}
.info-card-hdr img{width:32px;height:32px;border-radius:50%;background:#161830;border:1.5px solid rgba(255,255,255,0.1);object-fit:contain;padding:1px;flex-shrink:0}
.info-card-hdr .card-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--gold-light);letter-spacing:1px;flex-shrink:0}
.info-card-hdr .card-roster{font-size:11px;color:var(--text-dim);opacity:0.7;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:8px}
.info-card-hdr .card-arrow{font-size:10px;color:var(--gold-dim);transition:transform .3s;flex-shrink:0;margin-left:6px}
.info-card.open .card-arrow{transform:rotate(180deg)}
.info-card-body{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s}
.info-card.open .info-card-body{max-height:200px;padding:0 12px 10px}
.info-card-body p{font-size:12px;line-height:1.7;color:var(--text);opacity:0.8;margin:0}

.touch-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:0.85;transform:translate(-50%,-50%) scale(1.2);filter:drop-shadow(0 4px 12px rgba(0,0,0,0.7));width:44px;height:44px;border-radius:50%}
.save-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9998;align-items:center;justify-content:center}
.save-overlay.show{display:flex}
.save-msg{font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold);letter-spacing:2px}

@media(max-width:600px){
  .team-logo{width:38px;height:38px}.team-logo.in-slot{width:30px;height:30px}
  .drop-slot{width:38px;height:38px}.qc{width:20px;height:20px;font-size:10px}
}
</style>
</head>
<body>

<div id="captureArea">
  <div class="header">
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ja')">JA</button>
      <button class="lang-btn" onclick="setLang('ko')">KO</button>
    </div>
    <img src="logos_web/b5_logo.png" class="header-logo" alt="Best Five">
    <h1>BestFive Masters</h1>
    <div class="sub" id="txtSub">Experience the Major Format</div>
  </div>
  <div class="stage-label">— Stage 1 —</div>

  <div class="pool-wrap" id="poolWrap">
    <div class="pool-label"><span id="txtPoolLabel">Pick your 8 advancing teams</span> · <span id="counter">0</span> / 8</div>
    <div class="pool-info" id="txtPoolInfo">Drag to green zones · Drag between slots to swap · Double-click to remove</div>
    <div class="team-pool" id="teamPool"></div>
  </div>

  <div class="info-wrap">
    <div class="info-toggle-btn" id="infoToggleBtn" onclick="toggleInfoPanel()">
      <span id="txtInfoBtn">📋 Team Profiles</span>
      <span class="arrow">▼</span>
    </div>
    <div class="info-grid" id="infoGrid"></div>
  </div>

  <div class="completion" id="completionBanner">
    <p id="txtCompletion">✦ PICK'EM COMPLETE — SAVE &amp; SHARE ✦</p>
  </div>

  <div class="bracket-scroll" id="bracketScroll">
    <div class="bracket" id="bracket">
      <svg class="connector-svg" id="connSvg" xmlns="http://www.w3.org/2000/svg">
        <defs><marker id="ah" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="rgba(201,168,76,0.4)"/></marker></defs>
      </svg>
      <div class="round-col" id="col0"></div>
      <div class="round-col" id="col1"></div>
      <div class="round-col" id="col2"></div>
      <div class="round-col" id="col3"></div>
      <div class="round-col" id="col4"></div>
      <div class="round-col" id="col5"></div>
    </div>
  </div>

  <div class="watermark" id="txtWatermark">BestFive Masters · Pick'em Challenge</div>
</div>

<div class="actions">
  <button class="btn btn-reset" id="btnReset" onclick="resetAll()">Reset All</button>
  <button class="btn btn-save" id="btnSave" onclick="saveScreenshot()" disabled>Save Screenshot</button>
</div>
<div class="save-overlay" id="saveOverlay"><div class="save-msg" id="txtSaving">Generating image...</div></div>

<script>
const TOTAL_SLOTS=8;
let currentLang='en';

const i18n={
  en:{
    sub:'Experience the Major Format',
    poolLabel:'Pick your 8 advancing teams',
    poolInfo:'Drag to green zones · Drag between slots to swap · Double-click to remove',
    completion:'✦ PICK\'EM COMPLETE — SAVE & SHARE ✦',
    reset:'Reset All',
    save:'Save Screenshot',
    watermark:'BestFive Masters · Pick\'em Challenge',
    saving:'Generating image...',
    advance:'ADVANCE',
    infoBtn:'📋 Team Profiles'
  },
  ja:{
    sub:'メジャー形式を体験しよう',
    poolLabel:'勝ち上がる8チームを予想しよう',
    poolInfo:'緑のゾーンにドラッグ · スロット間でスワップ · ダブルクリックで戻す',
    completion:'✦ 予想完了 — 保存＆シェア ✦',
    reset:'リセット',
    save:'スクリーンショット保存',
    watermark:'BestFive Masters · Pick\'em Challenge',
    saving:'画像を生成中...',
    advance:'勝ち抜け',
    infoBtn:'📋 チーム紹介'
  },
  ko:{
    sub:'메이저 포맷을 경험하세요',
    poolLabel:'진출할 8팀을 예측하세요',
    poolInfo:'초록 영역으로 드래그 · 슬롯 간 교환 · 더블클릭으로 제거',
    completion:'✦ 예측 완료 — 저장 & 공유 ✦',
    reset:'초기화',
    save:'스크린샷 저장',
    watermark:'BestFive Masters · Pick\'em Challenge',
    saving:'이미지 생성 중...',
    advance:'진출',
    infoBtn:'📋 팀 소개'
  }
};

function setLang(lang){
  currentLang=lang;
  const t=i18n[lang];
  document.getElementById('txtSub').textContent=t.sub;
  document.getElementById('txtPoolLabel').textContent=t.poolLabel;
  document.getElementById('txtPoolInfo').textContent=t.poolInfo;
  document.getElementById('txtCompletion').textContent=t.completion;
  document.getElementById('btnReset').textContent=t.reset;
  document.getElementById('btnSave').textContent=t.save;
  document.getElementById('txtWatermark').textContent=t.watermark;
  document.getElementById('txtSaving').textContent=t.saving;
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.toLowerCase()===lang);
  });
  // Rebuild bracket with translated ADVANCE
  const savedSlots=[];
  document.querySelectorAll('.drop-slot').forEach(slot=>{
    const logo=slot.querySelector('.team-logo');
    if(logo)savedSlots.push({slotId:slot.closest('[id]').id,teamId:logo.dataset.teamId,logo:logo});
  });
  buildBracket();
  // Re-attach slot events
  document.querySelectorAll('.drop-slot').forEach(slot=>{
    slot.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move'});
    slot.addEventListener('dragenter',e=>{e.preventDefault();slot.classList.add('drag-over')});
    slot.addEventListener('dragleave',e=>{if(!slot.contains(e.relatedTarget))slot.classList.remove('drag-over')});
    slot.addEventListener('drop',onSlotDrop);
  });
  requestAnimationFrame(()=>{requestAnimationFrame(drawConnectors)});
  document.getElementById('txtInfoBtn').textContent=t.infoBtn;
  buildInfoPanel();
}

/* ===== TEAM DESCRIPTIONS (3 languages) ===== */
const teamDesc={
  en:{
    vega:'Formed by three members of the disbanded Japanese powerhouse megamega. Armed with the resolve for a fresh start and the same unwavering dedication and bonds as before, they return to the CS battlefield.',
    hachimitsu:'Driven by the purest love for the game, they step onto the stage with unwavering resilience and a never-give-up spirit, chasing the thrill of competition while pushing beyond their limits.',
    volt:'Never missing a single tournament — despite titles yet to come, VOLT keeps training at peak intensity, hungry to prove themselves on stage. Their moment will arrive.',
    volt_academy:'VOLT\'s academy squad, fueled by a pure passion for CS and fearless determination. With seamless teamwork, they step onto the CS2 stage for the very first time.',
    clubd:'Built from Japan\'s clubD community, this squad has graduated from internal scrims to the international Japan-Korea stage, eager to test their training against higher-level competition.',
    helix:'Five top-ranked players averaging PWA Diamond S, specializing in a textbook-style approach. They\'ve set their sights on dominating Stage 1.',
    ld:'A roster of seasoned Korean veterans who have competed consistently in BestFive events, bringing solid and battle-hardened experience. This dark horse is one no opponent should overlook.',
    exich:'Starting from Ataks Academy and now operating independently, this Korean squad features multiple former Ataks members. They crushed the online qualifiers at BEC Seoul LAN and showed formidable strength at CHOKEPOINT Tournament. Exich is ready to prove themselves.',
    ravens_ac:'The academy squad of Japan\'s strongest team, Ravens — young talents combining natural gift with relentless work ethic. Their growth shows in every tournament; at CHOKEPOINT they even pushed EXCIDIUM to the brink. Rising stars with a bright future.',
    cgc_one:'The second roster under CG Community, built to develop promising players and compete at the highest level. Focused on continuous improvement and teamwork, they aim to become one of the strongest lineups in the region.',
    cgc_academy:'CG Community\'s official development roster, dedicated to discovering and nurturing the next generation of CS2 talent — a platform for aspiring competitors to grow and prepare for higher-level play.',
    venom:'A team built around students with a deep love for CS, entering competitive play from CHOKEPOINT Tournament 1. This fresh squad is passionate about building synergy and enjoying the thrill of competition — the stage is their best classroom.',
    gloria:'Competing since 2025, they participated in HCSL Season 4, then rebranded as ATLAS for CHOKEPOINT Tournament 1, showing solid competitiveness. Now back under the Gloria name, they\'re ready to showcase the fruits of experience and effort.',
    zenith:'A rising squad led by former EXCIDIUM player MIK4, charging full speed toward professionalization — determined to make a stunning debut.',
    '8ballclub':'A fresh squad armed with passion and a challenger\'s spirit, yet bolstered by battle-hardened veterans in their ranks. Like the 8-ball in pool — the final, decisive shot — they aim to seal the deal with precise and clutch plays.',
    hotpink:'A rapidly rising Korean squad led by a captain with PUBG pro IGL experience, active since CHOKEPOINT Tournament. They defeated Japanese powerhouse MXPS in their debut — their time to prove themselves has come.'
  },
  ja:{
    vega:'日本の強豪megamega解散後、3名のメンバーが再結成。再出発の決意と変わらぬ真摯な姿勢、そして絆を胸に、再びCSの戦場へ。',

/* ===== CONNECTOR LINES ===== */
const connections=[
  ['b00','b10'],['b00','b01'],
  ['b10','b20'],['b10','b11'],
  ['b01','b11'],['b01','b02'],
  ['b20','b30'],['b20','b21'],
  ['b11','b21'],['b11','b12'],
  ['b02','b12'],['b02','b03'],
  ['b21','b31'],['b21','b22'],
  ['b12','b22'],['b12','b13'],
  ['b22','b32'],['b22','b23']
];

function connPath(x1,y1,x2,y2){
  const midX=(x1+x2)/2;
  const dy=y2-y1;
  if(Math.abs(dy)<2) return`M${x1},${y1}H${x2}`;
  const s=dy>0?1:-1;
  const r=Math.min(5,Math.abs(dy)/2,(x2-x1)/4);
  return`M${x1},${y1}H${midX-r}Q${midX},${y1} ${midX},${y1+s*r}V${y2-s*r}Q${midX},${y2} ${midX+r},${y2}H${x2}`;
}

let connRAF;
function drawConnectorsDebounced(){
  if(connRAF)cancelAnimationFrame(connRAF);
  connRAF=requestAnimationFrame(drawConnectors);
}

function drawConnectors(){
  const svg=document.getElementById('connSvg');
  const bracket=document.getElementById('bracket');
  const bR=bracket.getBoundingClientRect();
  const w=bracket.scrollWidth,h=bracket.scrollHeight;
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  svg.style.width=w+'px';svg.style.height=h+'px';

  const srcMap={},dstMap={};
  connections.forEach(([s,d])=>{
    if(!srcMap[s])srcMap[s]=[];srcMap[s].push(d);
    if(!dstMap[d])dstMap[d]=[];dstMap[d].push(s);
  });

  const defs=svg.querySelector('defs');
  const defsHTML=defs?defs.outerHTML:'';
  let paths=defsHTML;

  connections.forEach(([sId,dId])=>{
    const sEl=document.getElementById(sId),dEl=document.getElementById(dId);
    if(!sEl||!dEl)return;
    const sr=sEl.getBoundingClientRect(),dr=dEl.getBoundingClientRect();

    const sOuts=srcMap[sId];
    const sFrac=(sOuts.indexOf(dId)+1)/(sOuts.length+1);
    const x1=sr.right-bR.left;
    const y1=sr.top-bR.top+sr.height*sFrac;

    const dIns=dstMap[dId];
    const dFrac=(dIns.indexOf(sId)+1)/(dIns.length+1);
    const x2=dr.left-bR.left;
    const y2=dr.top-bR.top+dr.height*dFrac;

    paths+=`<path d="${connPath(x1,y1,x2,y2)}" marker-end="url(#ah)"/>`;
  });

  svg.innerHTML=paths;
}

function init(){
  buildBracket();
  const pool=document.getElementById('teamPool');
  teams.forEach(t=>pool.appendChild(createTeamEl(t)));
  buildInfoPanel();

  // Add events to all drop slots
  document.querySelectorAll('.drop-slot').forEach(slot=>{
    slot.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move'});
    slot.addEventListener('dragenter',e=>{e.preventDefault();slot.classList.add('drag-over')});
    slot.addEventListener('dragleave',e=>{if(!slot.contains(e.relatedTarget))slot.classList.remove('drag-over')});
    slot.addEventListener('drop',onSlotDrop);
  });

  // Pool also accepts drops (return to pool)
  const poolEl=document.getElementById('teamPool');
  poolEl.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move'});
  poolEl.addEventListener('drop',e=>{e.preventDefault();if(draggedTeam)returnToPool(draggedTeam)});

  requestAnimationFrame(()=>{requestAnimationFrame(drawConnectors)});
  window.addEventListener('resize',drawConnectorsDebounced);
}

function onSlotDrop(e){
  e.preventDefault();
  const targetSlot=e.target.closest('.drop-slot');
  if(!targetSlot||!draggedTeam)return;
  targetSlot.classList.remove('drag-over');

  const existingInTarget=targetSlot.querySelector('.team-logo');

  if(dragSourceSlot&&existingInTarget&&existingInTarget!==draggedTeam){
    // SWAP: both slots have logos — swap them
    const tempTeam=existingInTarget;
    // Move existing from target to source slot
    dragSourceSlot.appendChild(tempTeam);
    // Move dragged to target
    targetSlot.appendChild(draggedTeam);
  }else if(existingInTarget&&existingInTarget!==draggedTeam){
    // Target is filled, dragged comes from pool — send existing back to pool
    returnToPool(existingInTarget);
    placeInSlot(draggedTeam,targetSlot);
  }else if(!existingInTarget){
    // Target is empty
    placeInSlot(draggedTeam,targetSlot);
    if(dragSourceSlot){
      // Clean up source slot
      dragSourceSlot.classList.remove('filled');
      const q=dragSourceSlot.querySelector('.sq');
      if(q)q.style.display='';
    }
  }
  updateCounter();
}

function createTeamEl(t){
  const el=document.createElement('div');el.className='team-logo';el.draggable=true;el.dataset.teamId=t.id;
  el.innerHTML=`<img src="${t.logo}" alt="${t.name}" draggable="false"><span class="tip">${t.name}</span>`;

  el.addEventListener('dragstart',e=>{
    draggedTeam=el;
    dragSourceSlot=el.closest('.drop-slot')||null;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',t.id);
  });
  el.addEventListener('dragend',()=>{
    if(draggedTeam)draggedTeam.classList.remove('dragging');
    draggedTeam=null;dragSourceSlot=null;
    document.querySelectorAll('.drop-slot').forEach(s=>s.classList.remove('drag-over'));
  });

  el.addEventListener('touchstart',onTS,{passive:false});
  el.addEventListener('touchmove',onTM,{passive:false});
  el.addEventListener('touchend',onTE,{passive:false});
  el.addEventListener('dblclick',()=>{if(el.closest('.drop-slot'))returnToPool(el)});
  return el;
}

/* ===== TOUCH (improved targeting + auto-scroll) ===== */
let autoScrollRAF=null;

function findNearestSlot(x,y){
  // First: try elementFromPoint (most accurate)
  const el=document.elementFromPoint(x,y);
  if(el){
    const direct=el.closest('.drop-slot');
    if(direct)return direct;
  }
  // Fallback: nearest within 150px radius
  let best=null,bestDist=150;
  document.querySelectorAll('.drop-slot').forEach(slot=>{
    const r=slot.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dist=Math.sqrt((x-cx)**2+(y-cy)**2);
    if(dist<bestDist){bestDist=dist;best=slot}
  });
  return best;
}

function autoScroll(clientX,clientY){
  const edge=40;
  const speed=8;
  const vh=window.innerHeight;
  const vw=window.innerWidth;
  let scrollY=0,scrollX=0;

  // Vertical page scroll
  if(clientY<edge)scrollY=-speed;
  else if(clientY>vh-edge)scrollY=speed;

  // Horizontal bracket scroll
  const scrollEl=document.getElementById('bracketScroll');
  if(scrollEl){
    const r=scrollEl.getBoundingClientRect();
    if(clientY>r.top&&clientY<r.bottom){
      if(clientX<r.left+edge)scrollX=-speed;
      else if(clientX>r.right-edge)scrollX=speed;
    }
  }

  if(scrollY!==0)window.scrollBy(0,scrollY);
  if(scrollX!==0&&scrollEl)scrollEl.scrollLeft+=scrollX;
}

function onTS(e){
  const el=e.target.closest('.team-logo');if(!el)return;
  draggedTeam=el;
  dragSourceSlot=el.closest('.drop-slot')||null;
  const t=e.touches[0];
  touchGhost=el.cloneNode(true);touchGhost.className='team-logo touch-ghost';
  document.body.appendChild(touchGhost);
  touchGhost.style.left=t.clientX+'px';touchGhost.style.top=t.clientY+'px';
  el.classList.add('dragging');e.preventDefault();
}
function onTM(e){
  if(!draggedTeam||!touchGhost)return;e.preventDefault();
  const t=e.touches[0];
  touchGhost.style.left=t.clientX+'px';touchGhost.style.top=t.clientY+'px';

  // Auto-scroll near edges
  autoScroll(t.clientX,t.clientY);

  // Highlight nearest slot (hide ghost temporarily for elementFromPoint)
  touchGhost.style.display='none';
  document.querySelectorAll('.drop-slot').forEach(s=>s.classList.remove('drag-over'));
  const slot=findNearestSlot(t.clientX,t.clientY);
  if(slot)slot.classList.add('drag-over');
  touchGhost.style.display='';
}
function onTE(e){
  if(!draggedTeam)return;
  const t=e.changedTouches[0];
  if(touchGhost){touchGhost.remove();touchGhost=null}
  document.querySelectorAll('.drop-slot').forEach(s=>s.classList.remove('drag-over'));

  const slot=findNearestSlot(t.clientX,t.clientY);
  const poolArea=document.elementFromPoint(t.clientX,t.clientY);
  const isPool=poolArea?poolArea.closest('.team-pool'):null;

  if(slot){
    const existingInTarget=slot.querySelector('.team-logo');
    if(dragSourceSlot&&existingInTarget&&existingInTarget!==draggedTeam){
      dragSourceSlot.appendChild(existingInTarget);
      slot.appendChild(draggedTeam);
    }else if(existingInTarget&&existingInTarget!==draggedTeam){
      returnToPool(existingInTarget);
      placeInSlot(draggedTeam,slot);
    }else if(!existingInTarget){
      placeInSlot(draggedTeam,slot);
      if(dragSourceSlot){dragSourceSlot.classList.remove('filled');const q=dragSourceSlot.querySelector('.sq');if(q)q.style.display=''}
    }
  }else if(isPool){
    returnToPool(draggedTeam);
  }

  draggedTeam.classList.remove('dragging');
  draggedTeam=null;dragSourceSlot=null;
  updateCounter();
}

/* ===== SLOT LOGIC ===== */
function placeInSlot(el,slot){
  const q=slot.querySelector('.sq');if(q)q.style.display='none';
  el.classList.remove('dragging');el.classList.add('in-slot');
  slot.appendChild(el);slot.classList.add('filled');
}
function returnToPool(el){
  const slot=el.closest('.drop-slot');
  if(slot){slot.classList.remove('filled');const q=slot.querySelector('.sq');if(q)q.style.display=''}
  el.classList.remove('in-slot');
  document.getElementById('teamPool').appendChild(el);
  updateCounter();
}
function updateCounter(){
  const n=document.querySelectorAll('.drop-slot.filled').length;
  document.getElementById('counter').textContent=n;
  document.getElementById('completionBanner').classList.toggle('show',n===TOTAL_SLOTS);
  document.getElementById('btnSave').disabled=(n<TOTAL_SLOTS);
}
function resetAll(){
  const pool=document.getElementById('teamPool');
  document.querySelectorAll('.drop-slot').forEach(slot=>{
    const t=slot.querySelector('.team-logo');
    if(t){t.classList.remove('in-slot');pool.appendChild(t)}
    slot.classList.remove('filled');
    const q=slot.querySelector('.sq');if(q)q.style.display='';
  });
  updateCounter();
}

/* ===== SCREENSHOT ===== */
async function saveScreenshot(){
  const overlay=document.getElementById('saveOverlay');overlay.classList.add('show');
  const poolWrap=document.getElementById('poolWrap');
  const completion=document.getElementById('completionBanner');
  const infoWrap=document.querySelector('.info-wrap');
  const area=document.getElementById('captureArea');
  const scrollEl=document.getElementById('bracketScroll');
  const bracket=document.getElementById('bracket');
  const langSwitch=document.querySelector('.lang-switch');

  const poolD=poolWrap.style.display;const compD=completion.style.display;
  const infoD=infoWrap?infoWrap.style.display:'';
  const langD=langSwitch?langSwitch.style.display:'';
  const oldScroll=scrollEl.scrollLeft;

  poolWrap.style.display='none';completion.style.display='none';
  if(infoWrap)infoWrap.style.display='none';
  if(langSwitch)langSwitch.style.display='none';
  scrollEl.scrollLeft=0;

  const bw=bracket.scrollWidth+60;
  area.style.width=bw+'px';area.style.maxWidth=bw+'px';
  area.style.margin='0 auto';area.style.overflow='hidden';

  await new Promise(r=>setTimeout(r,300));
  try{
    const canvas=await html2canvas(area,{backgroundColor:'#091020',scale:Math.max(window.devicePixelRatio||1,3),useCORS:true,allowTaint:true,scrollX:0,scrollY:-window.scrollY,width:bw});
    const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){
      // Mobile: try Web Share API first, fallback to new tab
      const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
      const file=new File([blob],'BestFive_Masters_Pickem.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'BestFive Masters Pick\'em'});
      }else{
        // Open image in new tab for long-press save
        const dataUrl=canvas.toDataURL('image/png');
        const w=window.open('');
        if(w){
          w.document.write('<html><head><meta name="viewport" content="width=device-width"><title>Long press to save</title></head><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+dataUrl+'" style="max-width:100%;height:auto"></body></html>');
          w.document.close();
        }
      }
    }else{
      // Desktop: standard download
      const link=document.createElement('a');link.download='BestFive_Masters_Pickem.png';link.href=canvas.toDataURL('image/png');link.click();
    }
  }catch(err){console.error(err);alert('Screenshot failed. Please use your device screenshot instead.')}

  area.style.width='';area.style.maxWidth='';area.style.margin='';area.style.overflow='';
  poolWrap.style.display=poolD;completion.style.display=compD;
  if(infoWrap)infoWrap.style.display=infoD;
  if(langSwitch)langSwitch.style.display=langD;
  scrollEl.scrollLeft=oldScroll;
  overlay.classList.remove('show');
}

init();
</script>
