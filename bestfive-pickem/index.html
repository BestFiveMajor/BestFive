<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BestFive Masters Pick'em</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-dark: #0a1225;
  --bg-card: #111d35;
  --bg-card-hover: #162544;
  --gold: #c9a84c;
  --gold-dim: #8b6914;
  --gold-glow: rgba(201, 168, 76, 0.3);
  --advance-bg: #1a3a1a;
  --advance-border: #2d7a2d;
  --advance-text: #4ade80;
  --elim-bg: #3a1a1a;
  --elim-border: #7a2d2d;
  --elim-text: #f87171;
  --slot-bg: rgba(255,255,255,0.05);
  --slot-border: rgba(255,255,255,0.15);
  --slot-hover: rgba(201, 168, 76, 0.2);
  --text: #e8e2d0;
  --text-dim: #8a8470;
}

html { 
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 32px 16px 20px;
  background: linear-gradient(180deg, #0f1a30 0%, var(--bg-dark) 100%);
  border-bottom: 1px solid var(--gold-dim);
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.header h1 {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: linear-gradient(180deg, #f0e6c0 0%, var(--gold) 50%, var(--gold-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}

.header .subtitle {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(12px, 2vw, 16px);
  color: var(--gold-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 6px;
}

.header .instruction {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 12px;
  line-height: 1.5;
}

/* ===== TEAM POOL ===== */
.team-pool-section {
  padding: 16px;
  max-width: 900px;
  margin: 0 auto;
}

.section-label {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
  text-align: center;
}

.team-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  min-height: 70px;
  padding: 12px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
}

/* ===== TEAM LOGO ===== */
.team-logo {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  background: #1a1a2e;
  border: 2px solid rgba(255,255,255,0.12);
  cursor: grab;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
}

.team-logo:active { cursor: grabbing; }

.team-logo:hover {
  border-color: var(--gold);
  transform: scale(1.08);
  box-shadow: 0 0 12px var(--gold-glow);
}

.team-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 3px;
  pointer-events: none;
}

.team-logo .team-name-tooltip {
  position: absolute;
  bottom: -24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 100;
}

.team-logo:hover .team-name-tooltip {
  opacity: 1;
}

.team-logo.dragging {
  opacity: 0.4;
  transform: scale(0.9);
}

.team-logo.placed-in-slot {
  width: 52px;
  height: 52px;
}

/* ===== BRACKET AREA ===== */
.bracket-area {
  padding: 12px 16px 32px;
  max-width: 900px;
  margin: 0 auto;
}

.outcome-group {
  margin-bottom: 20px;
}

.group-header {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
  text-align: center;
  padding: 8px 16px;
  border-radius: 8px 8px 0 0;
  text-transform: uppercase;
}

.group-header.advance {
  background: linear-gradient(90deg, transparent, var(--advance-bg), transparent);
  color: var(--advance-text);
  border-bottom: 2px solid var(--advance-border);
}

.group-header.eliminated {
  background: linear-gradient(90deg, transparent, var(--elim-bg), transparent);
  color: var(--elim-text);
  border-bottom: 2px solid var(--elim-border);
}

.outcome-rows {
  background: var(--bg-card);
  border-radius: 0 0 12px 12px;
  padding: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  border-top: none;
}

.outcome-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.outcome-row:last-child { margin-bottom: 0; }

.outcome-label {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 1px;
  min-width: 50px;
  text-align: center;
  flex-shrink: 0;
}

.outcome-label.advance-label { color: var(--advance-text); }
.outcome-label.elim-label { color: var(--elim-text); }

.slots-container {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
}

/* ===== DROP SLOT ===== */
.drop-slot {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  border: 2px dashed var(--slot-border);
  background: var(--slot-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  position: relative;
  flex-shrink: 0;
}

.drop-slot .slot-placeholder {
  font-size: 24px;
  color: rgba(255,255,255,0.15);
  font-weight: 700;
}

.drop-slot.drag-over {
  border-color: var(--gold);
  background: var(--slot-hover);
  box-shadow: 0 0 16px var(--gold-glow);
}

.drop-slot.filled {
  border-style: solid;
  border-color: rgba(255,255,255,0.2);
  background: #1a1a2e;
}

.drop-slot.filled.advance-slot {
  border-color: var(--advance-border);
  background: rgba(45, 122, 45, 0.15);
}

.drop-slot.filled.elim-slot {
  border-color: var(--elim-border);
  background: rgba(122, 45, 45, 0.15);
}

/* ===== BUTTONS ===== */
.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  padding: 0 16px 32px;
  max-width: 900px;
  margin: 0 auto;
}

.btn {
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 12px 28px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-reset {
  background: rgba(255,255,255,0.08);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.12);
}

.btn-reset:hover {
  background: rgba(255,255,255,0.14);
  color: var(--text);
}

.btn-complete {
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #0a0a0a;
  display: none;
}

.btn-complete.show {
  display: block;
}

.btn-complete:hover {
  box-shadow: 0 0 20px var(--gold-glow);
  transform: translateY(-1px);
}

/* ===== COMPLETION BANNER ===== */
.completion-banner {
  display: none;
  text-align: center;
  padding: 16px;
  margin: 0 16px 20px;
  max-width: 868px;
  margin-left: auto;
  margin-right: auto;
  background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
  border: 1px solid var(--gold-dim);
  border-radius: 12px;
}

.completion-banner.show { display: block; }

.completion-banner p {
  color: var(--gold);
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
}

/* ===== COUNTER ===== */
.counter {
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
  padding: 8px 16px 0;
}

.counter span { color: var(--gold); font-weight: 600; }

/* ===== TOUCH DRAG GHOST ===== */
.touch-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.85;
  transform: translate(-50%, -50%) scale(1.15);
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .team-logo, .drop-slot {
    width: 50px;
    height: 50px;
  }
  .team-logo.placed-in-slot {
    width: 44px;
    height: 44px;
  }
  .outcome-row {
    gap: 8px;
  }
  .outcome-label {
    font-size: 13px;
    min-width: 40px;
  }
  .slots-container { gap: 6px; }
}

@media (max-width: 380px) {
  .team-logo, .drop-slot {
    width: 44px;
    height: 44px;
  }
  .team-logo.placed-in-slot {
    width: 38px;
    height: 38px;
  }
}

/* ===== WATERMARK for screenshots ===== */
.watermark {
  text-align: center;
  padding: 12px 16px 20px;
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--gold-dim);
  text-transform: uppercase;
  opacity: 0.5;
}
</style>
</head>
<body>

<div class="header">
  <h1>BestFive Masters</h1>
  <div class="subtitle">Pick'em Challenge</div>
  <div class="instruction">Drag team logos into your predicted outcomes · Screenshot to share</div>
</div>

<div class="counter">
  Teams placed: <span id="counter">0</span> / 16
</div>

<div class="team-pool-section">
  <div class="section-label">Team Pool</div>
  <div class="team-pool" id="teamPool"></div>
</div>

<div class="completion-banner" id="completionBanner">
  <p>✨ PICK'EM COMPLETE — SCREENSHOT & SHARE! ✨</p>
</div>

<div class="bracket-area">
  <!-- ADVANCE GROUP -->
  <div class="outcome-group">
    <div class="group-header advance">★ Advance ★</div>
    <div class="outcome-rows">
      <div class="outcome-row">
        <div class="outcome-label advance-label">3 : 0</div>
        <div class="slots-container" id="slots-3-0"></div>
      </div>
      <div class="outcome-row">
        <div class="outcome-label advance-label">3 : 1</div>
        <div class="slots-container" id="slots-3-1"></div>
      </div>
      <div class="outcome-row">
        <div class="outcome-label advance-label">3 : 2</div>
        <div class="slots-container" id="slots-3-2"></div>
      </div>
    </div>
  </div>

  <!-- ELIMINATED GROUP -->
  <div class="outcome-group">
    <div class="group-header eliminated">✕ Eliminated ✕</div>
    <div class="outcome-rows">
      <div class="outcome-row">
        <div class="outcome-label elim-label">2 : 3</div>
        <div class="slots-container" id="slots-2-3"></div>
      </div>
      <div class="outcome-row">
        <div class="outcome-label elim-label">1 : 3</div>
        <div class="slots-container" id="slots-1-3"></div>
      </div>
      <div class="outcome-row">
        <div class="outcome-label elim-label">0 : 3</div>
        <div class="slots-container" id="slots-0-3"></div>
      </div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>
</div>

<div class="watermark">BestFive Masters · Pick'em Challenge</div>

<script>
// ===== TEAM DATA =====
const teams = [
  { id: 'ravens', name: 'Ravens', logo: 'logos_web/Ravens.png' },
  { id: 'excidium', name: 'EXCIDIUM', logo: 'logos_web/EXCIDIUM_logo_transparent.png' },
  { id: 'mxps', name: 'MXPS', logo: 'logos_web/MXPS.png' },
  { id: 'genz', name: 'GENZ ClaN', logo: 'logos_web/GENZ_ClaN.png' },
  { id: 'beyond', name: 'Beyond Five', logo: 'logos_web/Beyond_Five.png' },
  { id: 'doragon', name: 'Doragon Gaming', logo: 'logos_web/Doragon_Gaming.png' },
  { id: 'core', name: 'CORE', logo: 'logos_web/CORE.png' },
  { id: 'gaming_ranger', name: 'Gaming Ranger', logo: 'logos_web/Gaming_Ranger.png' },
  { id: 'ojisan', name: 'OJISAN GAMING', logo: 'logos_web/OJISAN_GAMING.png' },
  { id: 'shrimp5', name: 'SHRIMP5', logo: 'logos_web/SHRIMP5.png' },
  { id: 'volt', name: 'Volt', logo: 'logos_web/volt.png' },
  { id: 'wix', name: 'WIX', logo: 'logos_web/WIX.png' },
  { id: 'indecay', name: 'INDECAY', logo: 'logos_web/INDECAY.png' },
  { id: 'megamega', name: 'megamega', logo: 'logos_web/megamega_1_.png' },
  { id: 'pmother', name: 'P-mother', logo: 'logos_web/P-mother.png' },
  { id: 'ravens_ac', name: 'Ravens AC', logo: 'logos_web/Ravens_AC.png' },
];

// Slot configuration: outcome -> number of slots
const slotConfig = {
  '3-0': { count: 2, type: 'advance' },
  '3-1': { count: 3, type: 'advance' },
  '3-2': { count: 3, type: 'advance' },
  '2-3': { count: 3, type: 'elim' },
  '1-3': { count: 3, type: 'elim' },
  '0-3': { count: 2, type: 'elim' },
};

let draggedTeam = null;
let touchGhost = null;

// ===== INIT =====
function init() {
  const pool = document.getElementById('teamPool');
  
  // Create team logos in pool
  teams.forEach(team => {
    const el = createTeamElement(team);
    pool.appendChild(el);
  });

  // Create drop slots
  Object.entries(slotConfig).forEach(([key, config]) => {
    const container = document.getElementById(`slots-${key}`);
    for (let i = 0; i < config.count; i++) {
      const slot = document.createElement('div');
      slot.className = `drop-slot ${config.type}-slot`;
      slot.dataset.outcome = key;
      slot.dataset.index = i;
      slot.innerHTML = '<span class="slot-placeholder">?</span>';
      
      // Desktop drag events
      slot.addEventListener('dragover', onDragOver);
      slot.addEventListener('dragenter', onDragEnter);
      slot.addEventListener('dragleave', onDragLeave);
      slot.addEventListener('drop', onDrop);
      
      container.appendChild(slot);
    }
  });
}

function createTeamElement(team) {
  const el = document.createElement('div');
  el.className = 'team-logo';
  el.draggable = true;
  el.dataset.teamId = team.id;
  el.innerHTML = `
    <img src="${team.logo}" alt="${team.name}" draggable="false">
    <span class="team-name-tooltip">${team.name}</span>
  `;
  
  // Desktop drag
  el.addEventListener('dragstart', onDragStart);
  el.addEventListener('dragend', onDragEnd);
  
  // Touch drag
  el.addEventListener('touchstart', onTouchStart, { passive: false });
  el.addEventListener('touchmove', onTouchMove, { passive: false });
  el.addEventListener('touchend', onTouchEnd, { passive: false });

  // Double click/tap to remove from slot
  el.addEventListener('dblclick', onDoubleClick);
  
  return el;
}

// ===== DESKTOP DRAG & DROP =====
function onDragStart(e) {
  draggedTeam = e.target.closest('.team-logo');
  draggedTeam.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedTeam.dataset.teamId);
}

function onDragEnd(e) {
  if (draggedTeam) draggedTeam.classList.remove('dragging');
  draggedTeam = null;
  document.querySelectorAll('.drop-slot').forEach(s => s.classList.remove('drag-over'));
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e) {
  e.preventDefault();
  const slot = e.target.closest('.drop-slot');
  if (slot && !slot.classList.contains('filled')) {
    slot.classList.add('drag-over');
  }
}

function onDragLeave(e) {
  const slot = e.target.closest('.drop-slot');
  if (slot) slot.classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  const slot = e.target.closest('.drop-slot');
  if (!slot) return;
  slot.classList.remove('drag-over');
  
  if (slot.classList.contains('filled')) {
    // If slot is filled, swap: return existing team to pool first
    const existingTeam = slot.querySelector('.team-logo');
    if (existingTeam) {
      returnToPool(existingTeam);
    }
  }
  
  if (draggedTeam) {
    placeInSlot(draggedTeam, slot);
  }
}

// ===== TOUCH DRAG & DROP =====
function onTouchStart(e) {
  const el = e.target.closest('.team-logo');
  if (!el) return;
  
  draggedTeam = el;
  
  const touch = e.touches[0];
  
  // Create ghost
  touchGhost = el.cloneNode(true);
  touchGhost.className = 'team-logo touch-ghost';
  touchGhost.style.width = '60px';
  touchGhost.style.height = '60px';
  document.body.appendChild(touchGhost);
  touchGhost.style.left = touch.clientX + 'px';
  touchGhost.style.top = touch.clientY + 'px';
  
  el.classList.add('dragging');
  e.preventDefault();
}

function onTouchMove(e) {
  if (!draggedTeam || !touchGhost) return;
  e.preventDefault();
  
  const touch = e.touches[0];
  touchGhost.style.left = touch.clientX + 'px';
  touchGhost.style.top = touch.clientY + 'px';
  
  // Highlight slot under finger
  const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.drop-slot').forEach(s => s.classList.remove('drag-over'));
  
  const slot = elemBelow ? elemBelow.closest('.drop-slot') : null;
  if (slot && !slot.classList.contains('filled')) {
    slot.classList.add('drag-over');
  }
}

function onTouchEnd(e) {
  if (!draggedTeam) return;
  
  // Find slot under last touch point
  const touch = e.changedTouches[0];
  if (touchGhost) {
    touchGhost.remove();
    touchGhost = null;
  }
  
  const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
  const slot = elemBelow ? elemBelow.closest('.drop-slot') : null;
  const pool = elemBelow ? elemBelow.closest('.team-pool') : null;
  
  document.querySelectorAll('.drop-slot').forEach(s => s.classList.remove('drag-over'));
  
  if (slot) {
    if (slot.classList.contains('filled')) {
      const existingTeam = slot.querySelector('.team-logo');
      if (existingTeam && existingTeam !== draggedTeam) {
        returnToPool(existingTeam);
      }
    }
    placeInSlot(draggedTeam, slot);
  } else if (pool) {
    // Dropped back on pool
    returnToPool(draggedTeam);
  }
  
  draggedTeam.classList.remove('dragging');
  draggedTeam = null;
}

// ===== DOUBLE CLICK TO REMOVE =====
function onDoubleClick(e) {
  const el = e.target.closest('.team-logo');
  if (!el) return;
  const slot = el.closest('.drop-slot');
  if (slot) {
    returnToPool(el);
  }
}

// ===== SLOT LOGIC =====
function placeInSlot(teamEl, slot) {
  // Remove placeholder
  const placeholder = slot.querySelector('.slot-placeholder');
  if (placeholder) placeholder.style.display = 'none';
  
  teamEl.classList.remove('dragging');
  teamEl.classList.add('placed-in-slot');
  slot.appendChild(teamEl);
  slot.classList.add('filled');
  
  updateCounter();
}

function returnToPool(teamEl) {
  const slot = teamEl.closest('.drop-slot');
  if (slot) {
    slot.classList.remove('filled');
    const placeholder = slot.querySelector('.slot-placeholder');
    if (placeholder) placeholder.style.display = '';
  }
  
  teamEl.classList.remove('placed-in-slot');
  document.getElementById('teamPool').appendChild(teamEl);
  
  updateCounter();
}

function updateCounter() {
  const placed = document.querySelectorAll('.drop-slot.filled').length;
  document.getElementById('counter').textContent = placed;
  
  const banner = document.getElementById('completionBanner');
  if (placed === 16) {
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function resetAll() {
  const pool = document.getElementById('teamPool');
  document.querySelectorAll('.drop-slot').forEach(slot => {
    const team = slot.querySelector('.team-logo');
    if (team) {
      team.classList.remove('placed-in-slot');
      pool.appendChild(team);
    }
    slot.classList.remove('filled');
    const placeholder = slot.querySelector('.slot-placeholder');
    if (placeholder) placeholder.style.display = '';
  });
  updateCounter();
}

// Init on load
init();
</script>

</body>
</html>
